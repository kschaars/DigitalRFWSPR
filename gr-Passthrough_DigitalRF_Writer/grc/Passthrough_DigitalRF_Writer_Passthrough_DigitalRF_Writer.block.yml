id: Passthrough_DigitalRF_Writer_Passthrough_DigitalRF_Writer
label: Digital RF Passthrough Sink
category: '[Haystack]'

file_format: 1

parameters:
- id: top_level_dir
  label: Directory
  dtype: string
  default: '/tmp/digital_rf'

- id: channels
  label: Channels
  dtype: raw
  default: "['ch0']"

- id: dtype
  label: Input/Output Type
  dtype: enum
  options: [np.complex64, np.float32, np.int16, np.int8]
  option_labels: [Complex Float32, Float32, Short Int16, Byte Int8]
  default: np.complex64

- id: sample_rate_numerator
  label: Sample Rate Numerator
  dtype: int
  default: int(samp_rate)

- id: sample_rate_denominator
  label: Sample Rate Denominator
  dtype: int
  default: 1

- id: subdir_cadence_secs
  label: Subdir Cadence (s)
  dtype: int
  default: 3600
  hide: part

- id: file_cadence_millisecs
  label: File Cadence (ms)
  dtype: int
  default: 1000
  hide: part

- id: start
  label: Start Time / Index
  dtype: string
  default: ''
  hide: part

- id: ignore_tags
  label: Ignore Stream Tags
  dtype: bool
  default: 'False'
  options: ['True', 'False']
  option_labels: ['Yes', 'No']
  hide: part

- id: is_complex
  label: Is Complex Data
  dtype: bool
  default: 'True'
  options: ['True', 'False']
  option_labels: ['Yes', 'No']
  hide: part

- id: num_subchannels
  label: Subchannels
  dtype: int
  default: 1
  hide: part

- id: uuid_str
  label: UUID String
  dtype: string
  default: ''
  hide: part

- id: center_frequencies
  label: Center Frequencies
  dtype: raw
  default: 'None'
  hide: part

- id: compression_level
  label: Compression Level (0-9)
  dtype: int
  default: 0
  hide: part

- id: checksum
  label: Enable Checksum
  dtype: bool
  default: 'False'
  options: ['True', 'False']
  option_labels: ['Yes', 'No']
  hide: part

- id: stop_on_skipped
  label: Stop on Skipped Samples
  dtype: bool
  default: 'False'
  options: ['True', 'False']
  option_labels: ['Yes', 'No']
  hide: part

- id: stop_on_time_tag
  label: Stop on Time Tag
  dtype: bool
  default: 'False'
  options: ['True', 'False']
  option_labels: ['Yes', 'No']
  hide: part

- id: debug
  label: Debug Mode
  dtype: bool
  default: 'False'
  options: ['True', 'False']
  option_labels: ['Enabled', 'Disabled']
  hide: part

inputs:
- label: in
  domain: stream
  dtype: ${ dtype }

outputs:
- label: out
  domain: stream
  dtype: ${ dtype }

templates:
  imports: from gnuradio import Passthrough_DigitalRF_Writer; import numpy as np
  make: |-
    Passthrough_DigitalRF_Writer.digital_rf_channel_sink(
        top_level_dir=${top_level_dir},
        channels=${channels},
        dtype=${dtype},
        subdir_cadence_secs=${subdir_cadence_secs},
        file_cadence_millisecs=${file_cadence_millisecs},
        sample_rate_numerator=${sample_rate_numerator},
        sample_rate_denominator=${sample_rate_denominator},
        start=${start} if ${start} else None,
        ignore_tags=${ignore_tags},
        is_complex=${is_complex},
        num_subchannels=${num_subchannels},
        uuid_str=${uuid_str} if ${uuid_str} else None,
        center_frequencies=${center_frequencies},
        compression_level=${compression_level},
        checksum=${checksum},
        stop_on_skipped=${stop_on_skipped},
        stop_on_time_tag=${stop_on_time_tag},
        debug=${debug}
    )
